AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Automated Weekly RDS Slow Query Report.
  Deploys a Lambda that queries CloudWatch Logs Insights for slow queries,
  builds an HTML report, and emails it via SES on a weekly schedule.

# ==============================================================================
# Parameters
# ==============================================================================
Parameters:
  LogGroupName:
    Type: String
    Description: CloudWatch Logs log group for the RDS slow query log.
    Default: /aws/rds/instance/spyne-prod-rds/slowquery

  SourceEmail:
    Type: String
    Description: >
      SES-verified sender email address (must be verified in the SES region).
    AllowedPattern: "^[\\w.+-]+@[\\w.-]+\\.[a-zA-Z]{2,}$"
    ConstraintDescription: Must be a valid email address.

  DestinationEmails:
    Type: CommaDelimitedList
    Description: >
      Comma-separated list of recipient email addresses.
      If SES is in sandbox mode, each address must be verified.

  SESRegion:
    Type: String
    Description: AWS region where SES is configured and sender email is verified.
    Default: us-east-1
    AllowedValues:
      - us-east-1
      - us-east-2
      - us-west-2
      - eu-west-1
      - eu-central-1
      - ap-south-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-northeast-1

  ScheduleExpression:
    Type: String
    Description: >
      EventBridge cron/rate expression for the report schedule.
      Default runs every Monday at 04:30 UTC (10:00 AM IST).
    Default: "cron(30 4 ? * MON *)"

  LookbackDays:
    Type: Number
    Description: Number of days to look back for slow queries.
    Default: 7
    MinValue: 1
    MaxValue: 30

  QueryLimit:
    Type: Number
    Description: Maximum number of slow queries to include in the report.
    Default: 20
    MinValue: 1
    MaxValue: 100

  LambdaMemorySize:
    Type: Number
    Description: Memory allocated to the Lambda function (MB).
    Default: 256
    AllowedValues: [128, 256, 512]

  LambdaTimeout:
    Type: Number
    Description: Lambda timeout in seconds (must accommodate Insights query polling).
    Default: 120
    MinValue: 30
    MaxValue: 300

# ==============================================================================
# Resources
# ==============================================================================
Resources:

  # ---------- IAM Role for Lambda ----------
  SlowQueryReportLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SlowQueryReportPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudWatchLogsStartQuery
                Effect: Allow
                Action:
                  - logs:StartQuery
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${LogGroupName}:*"
              - Sid: CloudWatchLogsGetQueryResults
                Effect: Allow
                Action:
                  - logs:GetQueryResults
                Resource: "*"
              - Sid: SESEmailSend
                Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
                Condition:
                  StringEquals:
                    ses:FromAddress: !Ref SourceEmail

  # ---------- Lambda Function ----------
  SlowQueryReportFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-reporter"
      Description: Queries RDS slow query logs and emails an HTML report via SES.
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt SlowQueryReportLambdaRole.Arn
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Environment:
        Variables:
          LOG_GROUP_NAME: !Ref LogGroupName
          SOURCE_EMAIL: !Ref SourceEmail
          DESTINATION_EMAILS: !Join [",", !Ref DestinationEmails]
          SES_REGION: !Ref SESRegion
          LOOKBACK_DAYS: !Ref LookbackDays
          QUERY_LIMIT: !Ref QueryLimit
      Code:
        ZipFile: |
          import boto3
          import time
          import os
          from datetime import datetime, timedelta, timezone

          logs_client = boto3.client("logs")
          ses_client = boto3.client("ses", region_name=os.environ["SES_REGION"])

          LOG_GROUP = os.environ["LOG_GROUP_NAME"]
          SOURCE_EMAIL = os.environ["SOURCE_EMAIL"]
          DESTINATION_EMAILS = os.environ["DESTINATION_EMAILS"].split(",")
          LOOKBACK_DAYS = int(os.environ.get("LOOKBACK_DAYS", "7"))
          QUERY_LIMIT = int(os.environ.get("QUERY_LIMIT", "20"))

          INSIGHTS_QUERY = """
              filter @message like "Query_time"
              | parse @message "# User@Host: *[*] @  [*]  Id: *\\n# Query_time: *  Lock_time: * Rows_sent: *  Rows_examined: *\\n*" as user, temp1, client_ip, id, query_time, lock_time, rows_sent, rows_examined, query_block
              | sort query_time desc
              | display query_time, lock_time, rows_examined, rows_sent, user, client_ip, query_block
              | limit {limit}
          """

          def run_insights_query(log_group, query, start_time, end_time):
              response = logs_client.start_query(
                  logGroupName=log_group,
                  startTime=start_time,
                  endTime=end_time,
                  queryString=query,
              )
              query_id = response["queryId"]
              max_attempts = 60
              for _ in range(max_attempts):
                  time.sleep(2)
                  result = logs_client.get_query_results(queryId=query_id)
                  if result["status"] not in ("Running", "Scheduled"):
                      return result
              raise TimeoutError(f"Insights query {query_id} did not complete within {max_attempts * 2}s")

          def build_html_report(results, start_dt, end_dt):
              period = f"{start_dt.strftime('%b %d, %Y')} &ndash; {end_dt.strftime('%b %d, %Y')}"
              html = f"""<html><head><style>
                  body {{ font-family: 'Segoe UI', Arial, sans-serif; color: #1a1a1a; padding: 20px; }}
                  h2 {{ color: #d63031; }}
                  .meta {{ color: #636e72; font-size: 14px; margin-bottom: 16px; }}
                  table {{ border-collapse: collapse; width: 100%; font-size: 13px; }}
                  th {{ background-color: #2d3436; color: #fff; padding: 10px 12px; text-align: left; }}
                  td {{ padding: 8px 12px; border-bottom: 1px solid #dfe6e9; vertical-align: top; }}
                  tr:nth-child(even) {{ background-color: #f5f6fa; }}
                  tr:hover {{ background-color: #dfe6e9; }}
                  code {{ background: #ffeaa7; padding: 2px 6px; border-radius: 3px; font-size: 12px; word-break: break-all; }}
                  .footer {{ margin-top: 20px; font-size: 12px; color: #b2bec3; }}
              </style></head><body>
              <h2>Weekly RDS Slow Query Report</h2>
              <p class="meta">
                  <strong>Log Group:</strong> {LOG_GROUP}<br>
                  <strong>Period:</strong> {period}<br>
                  <strong>Top {QUERY_LIMIT} slowest queries</strong>
              </p>"""
              if not results:
                  html += "<p><strong>No slow queries found for this period.</strong></p>"
              else:
                  html += """<table><tr>
                      <th>#</th><th>Query Time (s)</th><th>Lock Time (s)</th>
                      <th>Rows Examined</th><th>Rows Sent</th><th>User</th>
                      <th>Client IP</th><th>Query</th></tr>"""
                  for idx, row in enumerate(results, 1):
                      data = {f["field"]: f["value"] for f in row if not f["field"].startswith("@")}
                      html += f"""<tr>
                          <td>{idx}</td>
                          <td>{data.get('query_time','N/A')}</td>
                          <td>{data.get('lock_time','N/A')}</td>
                          <td>{data.get('rows_examined','N/A')}</td>
                          <td>{data.get('rows_sent','N/A')}</td>
                          <td>{data.get('user','N/A')}</td>
                          <td>{data.get('client_ip','N/A')}</td>
                          <td><code>{data.get('query_block','N/A')}</code></td></tr>"""
                  html += "</table>"
              html += f"""<p class="footer">Generated at {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S')} UTC by RDS Slow Query Reporter.</p>
              </body></html>"""
              return html

          def lambda_handler(event, context):
              end_dt = datetime.now(timezone.utc)
              start_dt = end_dt - timedelta(days=LOOKBACK_DAYS)
              query = INSIGHTS_QUERY.format(limit=QUERY_LIMIT)
              print(f"Running Insights query on {LOG_GROUP} from {start_dt} to {end_dt}")
              result = run_insights_query(LOG_GROUP, query, int(start_dt.timestamp()), int(end_dt.timestamp()))
              print(f"Query status: {result['status']}, rows: {len(result.get('results', []))}")
              html_body = build_html_report(result.get("results", []), start_dt, end_dt)
              subject = f"Weekly RDS Slow Query Report | {start_dt.strftime('%b %d')} - {end_dt.strftime('%b %d, %Y')}"
              ses_client.send_email(
                  Source=SOURCE_EMAIL,
                  Destination={"ToAddresses": DESTINATION_EMAILS},
                  Message={
                      "Subject": {"Data": subject, "Charset": "UTF-8"},
                      "Body": {"Html": {"Data": html_body, "Charset": "UTF-8"}},
                  },
              )
              print(f"Report emailed to {DESTINATION_EMAILS}")
              return {"statusCode": 200, "body": "Report sent successfully!"}

  # ---------- EventBridge Scheduled Rule ----------
  SlowQueryReportSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-weekly-schedule"
      Description: Triggers the slow query report Lambda on a weekly schedule.
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: SlowQueryReportLambdaTarget
          Arn: !GetAtt SlowQueryReportFunction.Arn

  # ---------- Permission for EventBridge to invoke Lambda ----------
  EventBridgeInvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SlowQueryReportFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SlowQueryReportSchedule.Arn

  # ---------- CloudWatch Log Group for Lambda logs ----------
  SlowQueryReportLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${SlowQueryReportFunction}"
      RetentionInDays: 14

# ==============================================================================
# Outputs
# ==============================================================================
Outputs:
  LambdaFunctionArn:
    Description: ARN of the slow query report Lambda function.
    Value: !GetAtt SlowQueryReportFunction.Arn

  LambdaFunctionName:
    Description: Name of the Lambda function (use for manual test invocation).
    Value: !Ref SlowQueryReportFunction

  EventBridgeRuleArn:
    Description: ARN of the EventBridge scheduled rule.
    Value: !GetAtt SlowQueryReportSchedule.Arn

  LambdaRoleArn:
    Description: ARN of the Lambda execution IAM role.
    Value: !GetAtt SlowQueryReportLambdaRole.Arn

  ScheduleExpression:
    Description: The schedule expression used for the EventBridge rule.
    Value: !Ref ScheduleExpression
